<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung TV Cursor Annihilation</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
            cursor: none !important;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none; /* Prevents Samsung's cursor reappearance */
        }

        .cursor-blocker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: transparent;
            z-index: 9999;
            pointer-events: all;
            cursor: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe id="presentation" src="https://docs.google.com/presentation/d/e/2PACX-1vQEYMewLXQQATrP5oczWdAXqCbQW0ly7CtlweRQQ3JTZTXmvml6NAs322vc5xqTp3IAB6sBhGtQtKM_/embed?start=true&loop=true&delayms=5000&rm=minimal" allowfullscreen></iframe>
        <div class="cursor-blocker"></div>
    </div>

    <script>
        function hideCursor() {
            document.documentElement.style.cursor = 'none';
            document.body.style.cursor = 'none';
            document.getElementById('presentation').style.cursor = 'none';
        }

        function forceHideCursor() {
            hideCursor();
            setTimeout(forceHideCursor, 50); // Reapply every 50ms (Samsung tries to reset)
        }

        function requestFullscreen() {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.mozRequestFullScreen) {
                document.documentElement.mozRequestFullScreen();
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            } else if (document.documentElement.msRequestFullscreen) {
                document.documentElement.msRequestFullscreen();
            }
        }

        function blockCursor(event) {
            event.preventDefault();
            hideCursor();
        }

        // Start aggressive cursor removal
        forceHideCursor();

        // Capture all user interactions
        document.addEventListener('mousemove', blockCursor, { passive: false });
        document.addEventListener('click', requestFullscreen, { passive: false });
        document.addEventListener('touchstart', blockCursor, { passive: false });
    </script>
</body>
</html>
