<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Image Slideshow</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f5f5f5;
        }
        
        .slideshow-container {
            max-width: 800px;
            position: relative;
            margin: 20px auto;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }
        
        .slide {
            display: none;
            width: 100%;
        }
        
        .slide img {
            width: 100%;
            height: 400px;
            object-fit: cover;
        }
        
        .active {
            display: block;
            animation: fadeIn 1s;
        }
        
        @keyframes fadeIn {
            from {opacity: 0.4}
            to {opacity: 1}
        }
        
        .controls {
            text-align: center;
            margin-top: 20px;
        }
        
        .dot {
            cursor: pointer;
            height: 12px;
            width: 12px;
            margin: 0 5px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.6s ease;
        }
        
        .active-dot, .dot:hover {
            background-color: #717171;
        }
        
        h1 {
            color: #333;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Image Slideshow</h1>
    
    <div class="slideshow-container">
        <div class="slide">
            <img src="/api/placeholder/800/400" alt="Image 1">
        </div>
        
        <div class="slide">
            <img src="/api/placeholder/800/400" alt="Image 2">
        </div>
        
        <div class="slide">
            <img src="/api/placeholder/800/400" alt="Image 3">
        </div>
        
        <div class="slide">
            <img src="/api/placeholder/800/400" alt="Image 4">
        </div>
        
        <div class="slide">
            <img src="/api/placeholder/800/400" alt="Image 5">
        </div>
    </div>
    
    <div class="controls">
        <span class="dot" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)"></span>
        <span class="dot" onclick="currentSlide(4)"></span>
        <span class="dot" onclick="currentSlide(5)"></span>
    </div>
    
    <script>
        let slideIndex = 0;
        let autoSlideInterval;
        
        // Start automatic slideshow
        function startAutoSlide() {
            autoSlideInterval = setInterval(() => {
                slideIndex++;
                if (slideIndex > 5) {
                    slideIndex = 1;
                }
                showSlides(slideIndex);
            }, 3000); // Change image every 3 seconds
        }
        
        // Stop automatic slideshow
        function stopAutoSlide() {
            clearInterval(autoSlideInterval);
        }
        
        // Show slides
        function showSlides(n) {
            const slides = document.getElementsByClassName("slide");
            const dots = document.getElementsByClassName("dot");
            
            if (n > slides.length) {
                slideIndex = 1;
            }
            if (n < 1) {
                slideIndex = slides.length;
            }
            
            // Hide all slides
            for (let i = 0; i < slides.length; i++) {
                slides[i].classList.remove("active");
                dots[i].classList.remove("active-dot");
            }
            
            // Show current slide
            slides[slideIndex - 1].classList.add("active");
            dots[slideIndex - 1].classList.add("active-dot");
        }
        
        // Show specific slide when dot is clicked
        function currentSlide(n) {
            stopAutoSlide();
            slideIndex = n;
            showSlides(slideIndex);
            startAutoSlide();
        }
        
        // Initialize slideshow
        window.onload = function() {
            slideIndex = 1;
            showSlides(slideIndex);
            startAutoSlide();
        };
    </script>
</body>
</html>
