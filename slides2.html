<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentation with Hidden Cursor</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        
        /* Full screen container */
        .presentation-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        
        /* iframe styling */
        #presentation {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* Transparent overlay that will catch all mouse events */
        .cursor-catcher {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            background: transparent;
            cursor: none !important;
        }
    </style>
</head>
<body>
    <div class="presentation-container">
        <!-- The iframe with the presentation -->
        <iframe id="presentation" src="https://docs.google.com/presentation/d/e/2PACX-1vQEYMewLXQQATrP5oczWdAXqCbQW0ly7CtlweRQQ3JTZTXmvml6NAs322vc5xqTp3IAB6sBhGtQtKM_/embed?start=true&loop=true&delayms=5000&rm=minimal" allowfullscreen></iframe>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.querySelector('.presentation-container');
            const iframe = document.getElementById('presentation');
            
            // Create transparent overlay that will catch all mouse events
            const overlay = document.createElement('div');
            overlay.className = 'cursor-catcher';
            document.body.appendChild(overlay);
            
            // Function to handle clicks on the overlay and pass them to the iframe
            overlay.addEventListener('click', function(event) {
                // Get click coordinates
                const x = event.clientX;
                const y = event.clientY;
                
                // Calculate position relative to the iframe
                const rect = iframe.getBoundingClientRect();
                const iframeX = x - rect.left;
                const iframeY = y - rect.top;
                
                // Create and dispatch a click event to the iframe
                const clickEvent = new MouseEvent('click', {
                    bubbles: true,
                    cancelable: true,
                    view: window,
                    clientX: x,
                    clientY: y
                });
                
                // Send the click to the iframe's position
                iframe.dispatchEvent(clickEvent);
            });
            
            // Handle all mouse events to keep cursor hidden
            ['mousemove', 'mouseenter', 'mouseover'].forEach(function(eventType) {
                overlay.addEventListener(eventType, function(e) {
                    e.preventDefault();
                    return false;
                });
            });
            
            // Ensure all elements have cursor:none (for Samsung Tizen)
            const styleEl = document.createElement('style');
            styleEl.innerHTML = `
                * { cursor: none !important; }
                html, body { cursor: none !important; }
                iframe { cursor: none !important; }
            `;
            document.head.appendChild(styleEl);
            
            // Force hide system cursor for Samsung Tizen browser
            if (navigator.userAgent.indexOf('Tizen') > -1) {
                // Add Tizen-specific empty cursor
                const tizenStyle = document.createElement('style');
                tizenStyle.innerHTML = `
                    * {
                        cursor: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='), auto !important;
                    }
                `;
                document.head.appendChild(tizenStyle);
            }
        });
    </script>
</body>
</html>
