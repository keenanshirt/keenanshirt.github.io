<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung TV Cursor Guillotine</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
            cursor: none !important;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .cursor-blocker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: transparent;
            z-index: 9999;
            pointer-events: all;
            visibility: visible; /* Keeps this div blocking the cursor */
            cursor: none !important; /* Hides the cursor in the parent */
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe id="presentation" src="https://docs.google.com/presentation/d/e/2PACX-1vQEYMewLXQQATrP5oczWdAXqCbQW0ly7CtlweRQQ3JTZTXmvml6NAs322vc5xqTp3IAB6sBhGtQtKM_/embed?start=true&loop=true&delayms=5000&rm=minimal" allowfullscreen></iframe>
        <div class="cursor-blocker"></div>
    </div>

    <script>
        function hideCursor() {
            document.documentElement.style.cursor = 'none';
            document.body.style.cursor = 'none';

            // No need to access iframe content since it's cross-origin
            // Just ensure the cursor is hidden globally
        }

        function forceHideCursor() {
            hideCursor();
            setTimeout(forceHideCursor, 50); // Apply cursor removal every 50ms
        }

        function detectSlideTransition() {
            let iframe = document.getElementById('presentation');
            if (iframe) {
                let lastSrc = iframe.src;
                setInterval(() => {
                    if (iframe.src !== lastSrc) {
                        lastSrc = iframe.src;
                        hideCursor(); // Hide cursor after slide transition
                    }
                }, 100);
            }
        }

        function monitorIframeChanges() {
            // Monitor iframe content indirectly (cannot access content directly due to cross-origin)
            const iframe = document.getElementById('presentation');
            if (iframe) {
                iframe.addEventListener('load', () => {
                    hideCursor(); // Hide cursor whenever iframe reloads (after slide change)
                });
            }
        }

        function requestFullscreen() {
            // Handle fullscreen request specifically for Tizen
            let docEl = document.documentElement;
            if (docEl.requestFullscreen) {
                docEl.requestFullscreen();
            } else if (docEl.webkitRequestFullscreen) {
                docEl.webkitRequestFullscreen();
            } else if (docEl.msRequestFullscreen) {
                docEl.msRequestFullscreen();
            }
        }

        // Run cursor removal aggressively
        forceHideCursor();
        detectSlideTransition();
        monitorIframeChanges(); // Start monitoring iframe content for changes

        // Listen to every possible event to keep cursor dead
        const events = [
            'mousemove', 'mousedown', 'mouseup', 'mouseenter', 'mouseleave',
            'mouseover', 'mouseout', 'click', 'dblclick', 'contextmenu',
            'touchstart', 'touchmove', 'touchend', 'touchcancel',
            'keydown', 'keyup', 'keypress', 'scroll', 'wheel', 'resize',
            'focus', 'blur', 'pointermove', 'pointerdown', 'pointerup',
            'pointerenter', 'pointerleave', 'pointerover', 'pointerout'
        ];

        events.forEach(event => {
            document.addEventListener(event, hideCursor, { passive: false });
        });

        // Attempt fullscreen on click
        document.addEventListener('click', requestFullscreen, { passive: false });
    </script>
</body>
</html>
