<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung TV Cursor Obliterator</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
            cursor: none !important;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
        }

        .cursor-blocker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            background: transparent;
            pointer-events: all;
            cursor: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe id="presentation" src="https://docs.google.com/presentation/d/e/2PACX-1vQEYMewLXQQATrP5oczWdAXqCbQW0ly7CtlweRQQ3JTZTXmvml6NAs322vc5xqTp3IAB6sBhGtQtKM_/embed?start=true&loop=true&delayms=20000&rm=minimal" allowfullscreen></iframe>
        <div class="cursor-blocker"></div>
    </div>

    <script>
        function hideCursor() {
            document.documentElement.style.cursor = 'none';
            document.body.style.cursor = 'none';
            document.getElementById('presentation').style.cursor = 'none';
        }

        function forceHideCursor() {
            hideCursor();
            requestAnimationFrame(forceHideCursor);  // Runs every frame (16ms)
        }

        function engageCursorLock() {
            if (document.body.requestPointerLock) {
                document.body.requestPointerLock();
            }
        }

        function requestFullscreen() {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.mozRequestFullScreen) {
                document.documentElement.mozRequestFullScreen();
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            } else if (document.documentElement.msRequestFullscreen) {
                document.documentElement.msRequestFullscreen();
            }
        }

        function blockCursor(event) {
            event.preventDefault();
            hideCursor();
        }

        // Run cursor removal aggressively
        forceHideCursor();
        setInterval(hideCursor, 10); // Reapply every 10ms in case of forced reset

        // Listen to every possible event to keep cursor dead
        const events = [
            'mousemove', 'mousedown', 'mouseup', 'mouseenter', 'mouseleave',
            'mouseover', 'mouseout', 'click', 'dblclick', 'contextmenu',
            'touchstart', 'touchmove', 'touchend', 'touchcancel',
            'keydown', 'keyup', 'keypress', 'scroll', 'wheel', 'resize',
            'focus', 'blur', 'pointermove', 'pointerdown', 'pointerup',
            'pointerenter', 'pointerleave', 'pointerover', 'pointerout'
        ];

        events.forEach(event => {
            document.addEventListener(event, blockCursor, { passive: false });
        });

        // On click, attempt fullscreen & pointer lock
        document.addEventListener('click', () => {
            requestFullscreen();
            engageCursorLock();
        }, { passive: false });
    </script>
</body>
</html>
