<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung TV Cursor Guillotine</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
            cursor: none !important;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .cursor-blocker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: transparent;
            z-index: 9999;
            pointer-events: all;
            cursor: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe id="presentation" src="https://docs.google.com/presentation/d/e/2PACX-1vQEYMewLXQQATrP5oczWdAXqCbQW0ly7CtlweRQQ3JTZTXmvml6NAs322vc5xqTp3IAB6sBhGtQtKM_/embed?start=true&loop=true&delayms=5000&rm=minimal" allowfullscreen></iframe>
    </div>

    <script>
        function hideCursor() {
            document.documentElement.style.cursor = 'none';
            document.body.style.cursor = 'none';
        }

        function createCursorBlocker() {
            const blocker = document.createElement('div');
            blocker.className = 'cursor-blocker';
            document.body.appendChild(blocker);
        }

        function recreateCursorBlocker() {
            const existingBlocker = document.querySelector('.cursor-blocker');
            if (existingBlocker) {
                existingBlocker.remove(); // Remove the existing blocker
            }
            createCursorBlocker(); // Create a new one
        }

        function forceRecreateCursorBlocker() {
            recreateCursorBlocker();
            setInterval(forceRecreateCursorBlocker, 1000); // Recreate every second
        }

        // Initially hide the cursor and create the blocker
        hideCursor();
        forceRecreateCursorBlocker(); // Start the periodic recreation
    </script>
</body>
</html>
