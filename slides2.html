<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Cursor</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
            cursor: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNgYAAAAAMAASsJTYQAAAAASUVORK5CYII='), auto;
        }
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .cursor-blocker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: transparent;
            z-index: 9999;
            cursor: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNgYAAAAAMAASsJTYQAAAAASUVORK5CYII='), auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe src="https://docs.google.com/presentation/d/e/2PACX-1vQEYMewLXQQATrP5oczWdAXqCbQW0ly7CtlweRQQ3JTZTXmvml6NAs322vc5xqTp3IAB6sBhGtQtKM_/embed?start=true&loop=true&delayms=5000&rm=minimal" allowfullscreen></iframe>
        <div class="cursor-blocker"></div>
    </div>

    <script>
        function hideCursor() {
            document.documentElement.style.cursor = 'url(data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNgYAAAAAMAASsJTYQAAAAASUVORK5CYII=), auto';
        }

        function lockPointer() {
            const blocker = document.querySelector('.cursor-blocker');
            blocker.requestPointerLock = blocker.requestPointerLock || blocker.mozRequestPointerLock || blocker.webkitRequestPointerLock;
            if (blocker.requestPointerLock) {
                blocker.requestPointerLock();
            }
        }

        // Enforce cursor hiding every frame
        setInterval(hideCursor, 50);

        // Try to lock pointer on user interaction
        document.addEventListener('click', lockPointer);
        document.addEventListener('mousemove', hideCursor);
    </script>
</body>
</html>
