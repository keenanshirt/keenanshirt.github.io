<html>
  <head>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        let idleMouseTimer;
        let forceMouseHide = false;
        document.body.style.cursor = "none";
        // Your wrapper here
        document.body.addEventListener("mousemove", () => {
          if (forceMouseHide) {
            return;
          }
          document.body.style.cursor = "";
          clearTimeout(idleMouseTimer);
          idleMouseTimer = setTimeout(() => {
            document.body.style.cursor = "none";
            forceMouseHide = true;
            setTimeout(() => {
              forceMouseHide = false;
            }, 200);
          }, 1000);
        });
      });
    </script>
    <style>
      .wrapper {
        position: relative;
      }

      .hide-cursor {
        position: absolute;
        top: 0;
        bottom: 0;
        right: 0;
        left: 0;
        z-index: 100;
      }

      html {
        overflow: auto;
      }

      html,
      body,
      div,
      iframe {
        margin: 0px;
        padding: 0px;
        height: 100%;
        border: none;
      }

      iframe {
        display: block;
        width: 100%;
        border: none;
        overflow-y: auto;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <iframe src="https://docs.google.com/presentation/d/e/2PACX-1vQEYMewLXQQATrP5oczWdAXqCbQW0ly7CtlweRQQ3JTZTXmvml6NAs322vc5xqTp3IAB6sBhGtQtKM_/embed?start=true&loop=true&delayms=5000&rm=minimal" frameborder="0" width="3840" height="2160" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
      <div class="hide-cursor"></div>
    </div>
  </body>
</html>
