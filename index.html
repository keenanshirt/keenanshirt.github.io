<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>hi</title>
    <style>
        html {
            background: url(wallpaper2.jpg) no-repeat center center fixed; 
            -webkit-background-size: cover;
            -moz-background-size: cover;
            -o-background-size: cover;
            background-size: cover;
        }
        .box {
            height: 150px;
            width: 400px;
            background: #000;
            font-size: 24px;
            font-style: oblique;
            color: #FFF;
            text-align: center;
            padding: 0 20px;
            margin: 20px;
            display: flex;
            justify-content: center; /* align horizontal */
            align-items: center; /* align vertical */
        }
        .center-div {
            position: absolute;
            margin: auto;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            width: auto;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="center-div">
        <div class="box">
            hey
        </div>   
    </div>
</body>
</html>
